<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración del documento: define la codificación de caracteres a UTF-8 para soportar tildes y ñ, 
         y configura el viewport para que la página sea legible y adaptable en dispositivos móviles -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Define el título que aparecerá en la pestaña del navegador -->
    <title>Mi Primera Página Web</title>
</head>
<body>

    <!-- Encabezado principal: define el bloque superior de la página, ideal para títulos, logos o menús -->
    <header>
        <h1>Bienvenido a mi sitio web</h1>
    </header>

    <!-- Contenido principal: marca el área donde reside el cuerpo central de información del documento -->
    <main>
        <!-- Sección: agrupa bloques de contenido temáticamente relacionados -->
        <section>
            <h2>Sobre mí</h2>
            <p>Hola, esta es una página básica creada para aprender la estructura de HTML.</p>
        </section>

        <!-- Otra sección: utilizada para separar diferentes temas de contenido -->
        <section>
            <h2>Mis temas favoritos</h2>
            <!-- Lista desordenada (bullets): define una colección de elementos que no requieren un orden específico -->
            <ul>
                <li>Desarrollo Web</li>
                <li>Inteligencia Artificial</li>
                <li>Análisis de Datos</li>
            </ul>
        </section>
    </main>

    <!-- Pie de página: bloque final para información de contacto, derechos de autor o enlaces secundarios -->
    <footer>
        <p>&copy; 2026 - Creado con fines educativos</p>
    </footer>

</body>
</html>
